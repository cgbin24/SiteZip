<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="SiteZip · 站点静态资源一键打包" />
        <link rel="icon" type="image/svg+xml" href="./logo.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <title>SiteZip · 站点静态资源一键打包</title>
        <script>(function(){try{var t=localStorage.getItem("sz_theme");document.documentElement.setAttribute("data-theme",["dark","light","green"].indexOf(t)>-1?t:"dark")}catch(e){document.documentElement.setAttribute("data-theme","dark")}})();</script>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
